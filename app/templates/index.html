<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VN News Summarizer</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --panel: #ffffff;
        --text: #172033;
        --muted: #5c667a;
        --line: #d8dde7;
        --accent: #0f766e;
        --accent-dark: #115e59;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      main {
        width: min(1040px, calc(100% - 32px));
        margin: 32px auto;
      }
      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 32px;
        line-height: 1.15;
      }
      p { line-height: 1.55; }
      .muted { color: var(--muted); margin: 0; }
      button {
        min-height: 44px;
        border: 0;
        border-radius: 6px;
        padding: 0 18px;
        background: var(--accent);
        color: white;
        font-size: 15px;
        font-weight: 700;
        cursor: pointer;
        white-space: nowrap;
      }
      button:hover { background: var(--accent-dark); }
      button:disabled { opacity: 0.65; cursor: wait; }
      .status {
        margin: 12px 0 20px;
        color: var(--muted);
        min-height: 24px;
      }
      .item {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 18px;
        margin-bottom: 14px;
      }
      .item h2 {
        margin: 0 0 8px;
        font-size: 19px;
        line-height: 1.35;
      }
      .meta {
        margin: 0 0 12px;
        color: var(--muted);
        font-size: 14px;
      }
      a { color: var(--accent-dark); }
      @media (max-width: 720px) {
        header { display: block; }
        button { width: 100%; margin-top: 18px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>VN News Summarizer</h1>
          <p class="muted">Model: {{ model_id }}. Số bài tối đa mỗi lần demo: {{ max_articles }}.</p>
        </div>
        <button id="summarizeBtn" type="button">Tóm tắt tin tức hôm nay</button>
      </header>
      <div id="status" class="status"></div>
      <section id="results"></section>
    </main>
    <script>
      const button = document.getElementById("summarizeBtn");
      const statusEl = document.getElementById("status");
      const resultsEl = document.getElementById("results");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      button.addEventListener("click", async () => {
        button.disabled = true;
        statusEl.textContent = "Đang crawl và tóm tắt...";
        resultsEl.innerHTML = "";
        try {
          const response = await fetch("/api/summarize-today", { method: "POST" });
          const data = await response.json();
          if (!response.ok) {
            throw new Error(data.detail || "Request failed");
          }
          statusEl.textContent = `Đã tóm tắt ${data.total} bài ngày ${data.date}.`;
          resultsEl.innerHTML = data.items.map((item) => `
            <article class="item">
              <h2>${escapeHtml(item.title)}</h2>
              <p class="meta">${escapeHtml(item.source)}${item.published_at ? " - " + escapeHtml(item.published_at) : ""}</p>
              <p>${escapeHtml(item.summary)}</p>
              <p class="meta">Tóm tắt bởi mô hình AI, có thể chưa chính xác.</p>
              <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener noreferrer nofollow">Đọc bài gốc</a>
            </article>
          `).join("");
        } catch (error) {
          statusEl.textContent = `Lỗi: ${error.message}`;
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
